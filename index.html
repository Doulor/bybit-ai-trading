<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruben AI · Bybit 交易终端</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a25;
    --border: #1e1e2e; --border2: #2a2a3e;
    --t1: #e8e8ec; --t2: #6e6e82; --t3: #44445a;
    --green: #00e676; --green2: rgba(0,230,118,0.12);
    --red: #ff3b3b; --red2: rgba(255,59,59,0.12);
    --blue: #3b82f6; --gold: #f5a623; --gold2: rgba(245,166,35,0.12);
    --cyan: #22d3ee;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans SC',sans-serif; background:var(--bg); color:var(--t1); min-height:100vh; }

  /* Top Bar */
  .topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topbar-logo { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:1.1em; color:var(--cyan); }
  .topbar-tag { background:var(--cyan); color:#000; font-size:0.6em; font-weight:700; padding:2px 6px; border-radius:3px; margin-left:8px; }
  .topbar-right { font-family:'JetBrains Mono',monospace; font-size:0.72em; color:var(--t3); }
  .topbar-right .live { color:var(--green); }
  .topbar-right .live::before { content:''; display:inline-block; width:6px; height:6px; background:var(--green); border-radius:50%; margin-right:4px; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .container { max-width:1200px; margin:0 auto; padding:20px 16px; }

  /* Grid Layout */
  .main-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
  .full-width { grid-column:1/-1; }
  @media(max-width:800px) { .main-grid { grid-template-columns:1fr; } }

  /* Cards */
  .card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:18px; }
  .card-title { font-size:0.7em; color:var(--t3); text-transform:uppercase; letter-spacing:1.5px; font-family:'JetBrains Mono',monospace; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .card-title .dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }

  /* Stats Row */
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:14px; }
  .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:14px; text-align:center; }
  .stat-card .label { font-size:0.65em; color:var(--t3); text-transform:uppercase; letter-spacing:1.2px; font-family:'JetBrains Mono',monospace; margin-bottom:6px; }
  .stat-card .value { font-family:'JetBrains Mono',monospace; font-size:1.35em; font-weight:700; }
  .green { color:var(--green); } .red { color:var(--red); } .blue { color:var(--blue); } .gold { color:var(--gold); } .cyan { color:var(--cyan); }

  /* Balance & Positions */
  .balance-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .balance-label { font-size:0.78em; color:var(--t2); }
  .balance-value { font-family:'JetBrains Mono',monospace; font-size:1.3em; font-weight:700; color:var(--cyan); }
  .balance-sub { font-family:'JetBrains Mono',monospace; font-size:0.85em; color:var(--t3); }
  .pos-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:8px; }
  .pos-card:last-child { margin-bottom:0; }
  .pos-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .pos-symbol { font-family:'JetBrains Mono',monospace; font-weight:700; }
  .pos-details { display:grid; grid-template-columns:1fr 1fr; gap:4px; font-family:'JetBrains Mono',monospace; font-size:0.75em; color:var(--t2); }
  .pos-details span { color:var(--t3); }
  .pos-pnl { font-family:'JetBrains Mono',monospace; font-weight:700; }
  .update-time { font-family:'JetBrains Mono',monospace; font-size:0.62em; color:var(--t3); text-align:right; margin-top:6px; }
  .no-data { font-family:'JetBrains Mono',monospace; font-size:0.82em; color:var(--t3); text-align:center; padding:16px; }

  /* Badges */
  .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.72em; font-weight:600; font-family:'JetBrains Mono',monospace; }
  .badge.long { background:var(--green2); color:var(--green); }
  .badge.short { background:var(--red2); color:var(--red); }
  .badge.tp { background:var(--green2); color:var(--green); }
  .badge.sl { background:var(--red2); color:var(--red); }
  .badge.hold { background:rgba(59,130,246,0.12); color:var(--blue); }
  .pnl-pos { color:var(--green); font-weight:600; }
  .pnl-neg { color:var(--red); font-weight:600; }

  /* Investors */
  .investors-row { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .investor-card { background:var(--bg2); border:1px solid var(--border); border-left:3px solid var(--gold); border-radius:8px; padding:12px 16px; flex:1; min-width:160px; }
  .inv-name { font-size:0.72em; color:var(--gold); font-weight:600; margin-bottom:2px; }
  .inv-amount { font-family:'JetBrains Mono',monospace; font-size:1.2em; font-weight:700; }
  .inv-label { font-size:0.62em; color:var(--t3); margin-top:2px; }

  /* Tables */
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; padding:8px 10px; color:var(--t3); font-size:0.65em; text-transform:uppercase; letter-spacing:1.2px; font-family:'JetBrains Mono',monospace; border-bottom:1px solid var(--border); font-weight:600; }
  td { padding:10px; font-family:'JetBrains Mono',monospace; font-size:0.82em; border-bottom:1px solid rgba(30,30,46,0.5); }
  tr:hover td { background:rgba(255,255,255,0.015); }

  /* Footer */
  .footer { text-align:center; color:var(--t3); padding:16px 0; font-family:'JetBrains Mono',monospace; font-size:0.68em; letter-spacing:0.5px; }

  /* Trade detail */
  tr.trade-row { cursor:pointer; }
  tr.trade-row:hover td { background:rgba(255,255,255,0.025); }
  tr.trade-detail-row { display:none; }
  tr.trade-detail-row.open { display:table-row; }
  tr.trade-detail-row td { padding:0; border-bottom:2px solid var(--cyan); }
  .detail-panel { background:var(--bg3); padding:16px 20px; display:grid; grid-template-columns:1fr 1fr; gap:12px 24px; }
  .detail-panel .dp-title { grid-column:1/-1; font-family:'JetBrains Mono',monospace; font-size:0.7em; color:var(--cyan); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; border-bottom:1px solid var(--border); padding-bottom:6px; }
  .detail-panel .dp-item { font-size:0.78em; }
  .detail-panel .dp-item .dp-label { color:var(--t3); margin-right:6px; }
  .detail-panel .dp-item .dp-value { color:var(--t1); font-family:'JetBrains Mono',monospace; }
  .detail-panel .dp-reason { grid-column:1/-1; font-size:0.78em; margin-top:4px; }
  .detail-panel .dp-reason .dp-label { color:var(--t3); display:block; margin-bottom:4px; }
  .detail-panel .dp-reason .dp-value { color:var(--t2); line-height:1.5; }
  .expand-icon { font-size:0.7em; color:var(--t3); margin-left:4px; transition:transform 0.2s; }
  tr.trade-row.expanded .expand-icon { transform:rotate(90deg); }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px">
    <div class="topbar-logo">RUBEN AI</div>
    <div class="topbar-tag">LIVE</div>
  </div>
  <div class="topbar-right"><span class="live">TERMINAL</span> · BYBIT USDT PERP</div>
</div>

<div class="container">

  <div class="stats-row" id="statsRow"></div>
  <div class="investors-row" id="investorsRow"></div>

  <div class="main-grid">
    <!-- 资金曲线 -->
    <div class="card full-width">
      <div class="card-title">EQUITY CURVE<span style="margin-left:auto;font-size:0.9em;color:var(--t2)" id="chartBadge">USDT</span></div>
      <canvas id="equityChart" height="70"></canvas>
    </div>

    <!-- 盈亏柱状图 -->
    <div class="card full-width">
      <div class="card-title">TRADE P&L<span style="margin-left:auto;font-size:0.9em;color:var(--t2)">PER TRADE</span></div>
      <canvas id="pnlChart" height="50"></canvas>
    </div>

    <!-- 交易记录 -->
    <div class="card full-width">
      <div class="card-title">TRADE HISTORY<span style="margin-left:auto;font-size:0.9em;color:var(--t2)" id="tradeCount"></span></div>
      <table>
        <thead><tr><th>时间</th><th>币种</th><th>方向</th><th>开仓价</th><th>平仓价</th><th>数量</th><th>结果</th><th>盈亏</th></tr></thead>
        <tbody id="tradesBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="footer" id="footer"></div>

<script>
// ========== 数据从 trades.json 加载 ==========
let TRADES = [];
let INITIAL_CAPITAL = 7.00;
let INVESTMENTS = [];
let lastUpdate = "";

async function loadTrades() {
  try {
    const resp = await fetch('data/trades.json?t=' + Date.now());
    if (!resp.ok) throw new Error('load failed');
    const data = await resp.json();
    TRADES = data.trades || [];
    INITIAL_CAPITAL = data.config?.initial_capital || 7.00;
    INVESTMENTS = data.config?.investments || [];
    lastUpdate = TRADES.length > 0 ? TRADES[TRADES.length-1].time : '';
  } catch(e) {
    console.error('Failed to load trades:', e);
  }
  renderAll();
}

// toggleDetail 放全局，inline onclick 才能找到
function toggleDetail(id) {
  const el = document.getElementById(id);
  const row = el.previousElementSibling;
  el.classList.toggle('open');
  row.classList.toggle('expanded');
}

function renderAll() {

const totalInvestment = INVESTMENTS.reduce((s, i) => s + i.amount, 0);
const totalPnl = TRADES.reduce((s, t) => s + t.pnl, 0);
const currentBalance = INITIAL_CAPITAL + totalInvestment + totalPnl;
const winTrades = TRADES.filter(t => t.pnl > 0).length;
const winRate = TRADES.length > 0 ? (winTrades / TRADES.length * 100) : 0;
const bestTrade = Math.max(...TRADES.map(t => t.pnl));
const worstTrade = Math.min(...TRADES.map(t => t.pnl));

// 时间加权收益率 (TWR)
const allEvents2 = [];
TRADES.forEach((t, i) => allEvents2.push({ type: 'trade', time: t.time, pnl: t.pnl }));
INVESTMENTS.forEach(inv => allEvents2.push({ type: 'investment', time: inv.time, amount: inv.amount }));
allEvents2.sort((a, b) => a.time > b.time ? 1 : a.time < b.time ? -1 : (a.type === 'investment' ? -1 : 1));

let balance = INITIAL_CAPITAL;
let segStart = INITIAL_CAPITAL;
let twrProduct = 1;
const twrSegs = [`起始资金: ${segStart.toFixed(2)}U`];

allEvents2.forEach(ev => {
  if (ev.type === 'trade') {
    balance += ev.pnl;
  } else {
    const segRet = (balance / segStart - 1) * 100;
    twrSegs.push(`${balance.toFixed(2)}U ÷ ${segStart.toFixed(2)}U = ${(balance/segStart).toFixed(4)} (${segRet >= 0 ? '+' : ''}${segRet.toFixed(1)}%)`);
    twrProduct *= (balance / segStart);
    balance += ev.amount;
    segStart = balance;
    twrSegs.push(`💰 投资+${ev.amount}U → 新基数 ${segStart.toFixed(2)}U`);
  }
});
const segRet = (balance / segStart - 1) * 100;
twrSegs.push(`${balance.toFixed(2)}U ÷ ${segStart.toFixed(2)}U = ${(balance/segStart).toFixed(4)} (${segRet >= 0 ? '+' : ''}${segRet.toFixed(1)}%)`);
twrProduct *= (balance / segStart);
const roi = (twrProduct - 1) * 100;
twrSegs.push(`TWR = ${twrProduct.toFixed(4)} → 收益率 ${(roi >= 0 ? '+' : '') + roi.toFixed(1)}%`);
const twrTooltip = twrSegs.join('\n');

// 统计卡片
const stats = [
  { label: "初始资金", value: INITIAL_CAPITAL.toFixed(2), cls: "cyan" },
  { label: "外部投资", value: totalInvestment.toFixed(2), cls: "gold" },
  { label: "当前余额", value: currentBalance.toFixed(2), cls: totalPnl >= 0 ? "green" : "red" },
  { label: "交易盈亏", value: (totalPnl >= 0 ? "+" : "") + totalPnl.toFixed(2), cls: totalPnl >= 0 ? "green" : "red" },
  { label: "收益率(TWR)", value: (roi >= 0 ? "+" : "") + roi.toFixed(1) + "%", cls: roi >= 0 ? "green" : "red", title: twrTooltip },
  { label: "胜率", value: winRate.toFixed(0) + "%", cls: winRate >= 50 ? "green" : "red" },
  { label: "最佳单", value: "+" + bestTrade.toFixed(2), cls: "green" },
  { label: "最差单", value: worstTrade.toFixed(2), cls: "red" },
];
document.getElementById("statsRow").innerHTML = stats.map(s =>
  `<div class="stat-card"${s.title ? ' title="' + s.title.replace(/"/g, '&quot;') + '" style="cursor:help"' : ''}><div class="label">${s.label}</div><div class="value ${s.cls}">${s.value}</div></div>`
).join("");

// 投资人
document.getElementById("investorsRow").innerHTML = INVESTMENTS.map(inv =>
  `<div class="investor-card"><div class="inv-name">${inv.name}</div><div class="inv-amount">${inv.amount.toFixed(2)} USDT</div><div class="inv-label">${inv.time}</div></div>`
).join("");

// 交易表格 - 最新在上
document.getElementById("tradeCount").textContent = TRADES.length + " TRADES";
const tbody = document.getElementById("tradesBody");
[...TRADES].reverse().forEach((t, idx) => {
  const sideCls = t.side === "long" ? "long" : "short";
  const sideText = t.side === "long" ? "LONG" : "SHORT";
  const resultCls = t.result === "tp" ? "tp" : t.result === "sl" ? "sl" : "hold";
  const resultText = t.result === "tp" ? "TP" : t.result === "sl" ? "SL" : "HOLD";
  const pnlCls = t.pnl >= 0 ? "pnl-pos" : "pnl-neg";
  const pnlText = (t.pnl >= 0 ? "+" : "") + t.pnl.toFixed(2);
  const exitText = t.exit ? t.exit : "-";
  const id = "trade-" + idx;
  tbody.innerHTML += `
    <tr class="trade-row" onclick="toggleDetail('${id}')">
      <td>${t.time}</td><td>${t.symbol}</td>
      <td><span class="badge ${sideCls}">${sideText}</span></td>
      <td>${t.entry}</td><td>${exitText}</td><td>${t.qty}</td>
      <td><span class="badge ${resultCls}">${resultText}</span></td>
      <td class="${pnlCls}">${pnlText}</td>
      <td class="expand-icon">▶</td>
    </tr>
    <tr class="trade-detail-row" id="${id}">
      <td colspan="9">
        <div class="detail-panel">
          <div class="dp-title">交易详情</div>
          <div class="dp-item"><span class="dp-label">杠杆:</span><span class="dp-value">${t.leverage || '-'}x</span></div>
          <div class="dp-item"><span class="dp-label">持仓时间:</span><span class="dp-value">${t.holdTime || '-'}</span></div>
          <div class="dp-item"><span class="dp-label">止盈价:</span><span class="dp-value">${t.tp || '-'}</span></div>
          <div class="dp-item"><span class="dp-label">止损价:</span><span class="dp-value">${t.sl || '-'}</span></div>
          <div class="dp-reason"><span class="dp-label">📈 入场逻辑:</span><span class="dp-value">${t.entryReason || '-'}</span></div>
          <div class="dp-reason"><span class="dp-label">📤 平仓原因:</span><span class="dp-value">${t.exitReason || '-'}</span></div>
        </div>
      </td>
    </tr>`;
});

// 资金曲线 - 按时间排序所有事件
const allEvents = [];
TRADES.forEach((t, i) => allEvents.push({ type: 'trade', time: t.time, pnl: t.pnl, symbol: t.symbol }));
INVESTMENTS.forEach(inv => allEvents.push({ type: 'investment', time: inv.time, amount: inv.amount, name: inv.name }));
allEvents.sort((a, b) => a.time > b.time ? 1 : a.time < b.time ? -1 : (a.type === 'investment' ? -1 : 1));

const equityLabels = ["START"];
const equityData = [INITIAL_CAPITAL];
const pointBg = ["#22d3ee"];
const pointR = [5];
let running = INITIAL_CAPITAL;
let tradeCount = 0;

allEvents.forEach(ev => {
  if (ev.type === 'trade') {
    tradeCount++;
    equityLabels.push("#" + tradeCount + " " + ev.symbol);
    running += ev.pnl;
    equityData.push(parseFloat(running.toFixed(2)));
    pointBg.push(ev.pnl >= 0 ? "#22d3ee" : "#ff3b3b");
    pointR.push(5);
  } else {
    equityLabels.push(ev.name + " +" + ev.amount + "U");
    running += ev.amount;
    equityData.push(parseFloat(running.toFixed(2)));
    pointBg.push("#f5a623");
    pointR.push(9);
  }
});

// 盈亏柱状图
const pnlLabels = TRADES.map((t, i) => "#" + (i+1) + " " + t.symbol);
const pnlValues = TRADES.map(t => t.pnl);
const pnlColors = pnlValues.map(v => v >= 0 ? "rgba(0,230,118,0.7)" : "rgba(255,59,59,0.7)");
const pnlBorders = pnlValues.map(v => v >= 0 ? "#00e676" : "#ff3b3b");

const font = { family: "'JetBrains Mono', monospace" };
const tipStyle = { backgroundColor:"#1a1a2e", titleColor:"#e8e8ec", bodyColor:"#888", borderColor:"#2a2a3e", borderWidth:1, cornerRadius:6, padding:10, titleFont:{...font,weight:"600"}, bodyFont:font };
const gridX = { grid:{color:"rgba(255,255,255,0.03)",drawBorder:false}, ticks:{color:"#44445a",font:{...font,size:10}} };
const gridY = { grid:{color:"rgba(255,255,255,0.03)",drawBorder:false}, ticks:{color:"#44445a",font:{...font,size:10},callback:v=>v.toFixed(2)} };

new Chart(document.getElementById("equityChart"), {
  type:"line", data:{ labels:equityLabels, datasets:[{ data:equityData, borderColor:"#22d3ee", backgroundColor:"rgba(34,211,238,0.04)", borderWidth:2, pointBackgroundColor:pointBg, pointBorderColor:"transparent", pointRadius:pointR, pointHoverRadius:8, fill:true, tension:0.3 }] },
  options:{ responsive:true, plugins:{legend:{display:false},tooltip:{...tipStyle,callbacks:{label:ctx=>ctx.parsed.y.toFixed(2)+" USDT"}}}, scales:{x:gridX,y:gridY} }
});

new Chart(document.getElementById("pnlChart"), {
  type:"bar", data:{ labels:pnlLabels, datasets:[{ data:pnlValues, backgroundColor:pnlColors, borderColor:pnlBorders, borderWidth:1, borderRadius:4, borderSkipped:false }] },
  options:{ responsive:true, plugins:{legend:{display:false},tooltip:{...tipStyle,callbacks:{label:ctx=>(ctx.parsed.y>=0?"+":"")+ctx.parsed.y.toFixed(2)+" USDT"}}}, scales:{x:gridX,y:{...gridY,beginAtZero:true}} }
});

document.getElementById("footer").textContent = "RUBEN AI · BYBIT USDT PERP · LAST UPDATE: " + lastUpdate;

} // end renderAll

loadTrades();
</script>
</body>
</html>
