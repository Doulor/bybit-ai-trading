<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruben AI · Bybit 交易记录</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }
  .header { text-align: center; padding: 30px 0 20px; }
  .header h1 {
    font-size: 2em;
    background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0%,100%{background-position:0%} 50%{background-position:100%} }
  .header .subtitle { color: #888; margin-top: 8px; font-size: 0.95em; }
  .stats-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin: 24px 0; }
  .stat-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px 28px;
    min-width: 150px;
    text-align: center;
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-4px); }
  .stat-card .label { font-size: 0.78em; color: #999; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .value { font-size: 1.8em; font-weight: 700; margin-top: 6px; }
  .stat-card .value.green { color: #00e676; }
  .stat-card .value.red { color: #ff5252; }
  .stat-card .value.blue { color: #40c4ff; }
  .chart-container {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 28px;
    margin: 24px auto;
    max-width: 900px;
  }
  .chart-container h2 { font-size: 1.1em; color: #aaa; margin-bottom: 16px; font-weight: 500; }
  .trades-table {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 28px;
    margin: 24px auto;
    max-width: 900px;
    overflow-x: auto;
  }
  .trades-table h2 { font-size: 1.1em; color: #aaa; margin-bottom: 16px; font-weight: 500; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; color: #888; font-size: 0.78em; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  td { padding: 12px; font-size: 0.95em; border-bottom: 1px solid rgba(255,255,255,0.04); }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.78em; font-weight: 600; }
  .badge.long { background: rgba(0,230,118,0.15); color: #00e676; }
  .badge.short { background: rgba(255,82,82,0.15); color: #ff5252; }
  .badge.tp { background: rgba(64,196,255,0.15); color: #40c4ff; }
  .badge.sl { background: rgba(255,82,82,0.2); color: #ff5252; }
  .pnl-pos { color: #00e676; font-weight: 600; }
  .pnl-neg { color: #ff5252; font-weight: 600; }
  .footer { text-align: center; color: #555; padding: 30px 0; font-size: 0.8em; }
  @media (max-width: 600px) {
    .stats-row { flex-direction: column; align-items: center; }
    .stat-card { width: 100%; max-width: 300px; }
    td, th { padding: 8px 6px; font-size: 0.85em; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>Ruben AI 交易仪表盘</h1>
  <div class="subtitle">Bybit USDT 永续合约 · AI 子账户</div>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="chart-container">
  <h2>资金曲线</h2>
  <canvas id="equityChart"></canvas>
</div>

<div class="chart-container">
  <h2>单笔盈亏</h2>
  <canvas id="pnlChart"></canvas>
</div>

<div class="trades-table">
  <h2>交易记录</h2>
  <table>
    <thead>
      <tr><th>时间</th><th>币种</th><th>方向</th><th>开仓价</th><th>平仓价</th><th>数量</th><th>结果</th><th>盈亏</th></tr>
    </thead>
    <tbody id="tradesBody"></tbody>
  </table>
</div>

<div class="footer" id="footer"></div>

<script>
// ========== 交易数据，每次新增一条即可 ==========
const INITIAL_CAPITAL = 7.00;
const TRADES = [
  { time: "06-20 15:10", symbol: "EPICUSDT",  side: "long", entry: 0.4257, exit: 0.4408, qty: 148, result: "tp", pnl: 2.23 },
  { time: "06-20 15:33", symbol: "HEIUSDT",   side: "long", entry: 0.1018, exit: 0.1068, qty: 401, result: "tp", pnl: 1.81 },
];
// =================================================

// 计算统计
const totalPnl = TRADES.reduce((s, t) => s + t.pnl, 0);
const currentBalance = INITIAL_CAPITAL + totalPnl;
const winTrades = TRADES.filter(t => t.pnl > 0).length;
const winRate = TRADES.length > 0 ? (winTrades / TRADES.length * 100) : 0;
const lastUpdate = "2026-06-20 18:17";

// 渲染统计卡片
const statsHtml = [
  { label: "初始资金", value: INITIAL_CAPITAL.toFixed(2) + " U", cls: "blue" },
  { label: "当前余额", value: currentBalance.toFixed(2) + " U", cls: totalPnl >= 0 ? "green" : "red" },
  { label: "累计盈亏", value: (totalPnl >= 0 ? "+" : "") + totalPnl.toFixed(2) + " U", cls: totalPnl >= 0 ? "green" : "red" },
  { label: "胜率", value: winRate.toFixed(0) + "%", cls: winRate >= 50 ? "green" : "red" },
  { label: "总交易次数", value: String(TRADES.length), cls: "blue" },
].map(s => `<div class="stat-card"><div class="label">${s.label}</div><div class="value ${s.cls}">${s.value}</div></div>`).join("");
document.getElementById("statsRow").innerHTML = statsHtml;

// 渲染交易记录表
const tbody = document.getElementById("tradesBody");
TRADES.forEach(t => {
  const sideCls = t.side === "long" ? "long" : "short";
  const sideText = t.side === "long" ? "做多" : "做空";
  const resultCls = t.result === "tp" ? "tp" : "sl";
  const resultText = t.result === "tp" ? "止盈" : "止损";
  const pnlCls = t.pnl >= 0 ? "pnl-pos" : "pnl-neg";
  const pnlText = (t.pnl >= 0 ? "+" : "") + t.pnl.toFixed(2) + " U";
  tbody.innerHTML += `<tr>
    <td>${t.time}</td><td>${t.symbol}</td>
    <td><span class="badge ${sideCls}">${sideText}</span></td>
    <td>${t.entry}</td><td>${t.exit}</td><td>${t.qty}</td>
    <td><span class="badge ${resultCls}">${resultText}</span></td>
    <td class="${pnlCls}">${pnlText}</td>
  </tr>`;
});

// 资金曲线数据
const equityLabels = ["起始"];
const equityData = [INITIAL_CAPITAL];
let running = INITIAL_CAPITAL;
TRADES.forEach((t, i) => {
  equityLabels.push(`第${i + 1}单 (${t.symbol})`);
  running += t.pnl;
  equityData.push(parseFloat(running.toFixed(2)));
});
equityLabels.push("当前");
equityData.push(parseFloat(currentBalance.toFixed(2)));

// 盈亏柱状图数据
const pnlLabels = TRADES.map(t => t.symbol + (t.side === "long" ? " 做多" : " 做空"));
const pnlValues = TRADES.map(t => t.pnl);
const pnlColors = pnlValues.map(v => v >= 0 ? "rgba(0,230,118,0.6)" : "rgba(255,82,82,0.6)");
const pnlBorders = pnlValues.map(v => v >= 0 ? "#00e676" : "#ff5252");

const commonOpts = {
  responsive: true,
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: "rgba(30,30,60,0.95)", titleColor: "#fff", bodyColor: "#ccc",
      borderColor: "rgba(255,255,255,0.1)", borderWidth: 1, cornerRadius: 10, padding: 12,
    }
  },
  scales: {
    x: { grid: { color: "rgba(255,255,255,0.04)" }, ticks: { color: "#888" } },
    y: { grid: { color: "rgba(255,255,255,0.06)" }, ticks: { color: "#888", callback: v => v.toFixed(2) + " U" } }
  }
};

new Chart(document.getElementById("equityChart"), {
  type: "line",
  data: {
    labels: equityLabels,
    datasets: [{
      label: "资金 (USDT)", data: equityData,
      borderColor: "#00d2ff", backgroundColor: "rgba(0,210,255,0.08)",
      borderWidth: 3, pointBackgroundColor: "#00d2ff", pointBorderColor: "#fff",
      pointBorderWidth: 2, pointRadius: 6, pointHoverRadius: 8, fill: true, tension: 0.35,
    }]
  },
  options: { ...commonOpts, plugins: { ...commonOpts.plugins, tooltip: { ...commonOpts.plugins.tooltip, callbacks: { label: ctx => "资金: " + ctx.parsed.y.toFixed(2) + " USDT" } } } }
});

new Chart(document.getElementById("pnlChart"), {
  type: "bar",
  data: {
    labels: pnlLabels,
    datasets: [{ label: "盈亏 (USDT)", data: pnlValues, backgroundColor: pnlColors, borderColor: pnlBorders, borderWidth: 2, borderRadius: 8, borderSkipped: false }]
  },
  options: { ...commonOpts, plugins: { ...commonOpts.plugins, tooltip: { ...commonOpts.plugins.tooltip, callbacks: { label: ctx => (ctx.parsed.y >= 0 ? "+" : "") + ctx.parsed.y.toFixed(2) + " USDT" } } }, scales: { ...commonOpts.scales, y: { ...commonOpts.scales.y, beginAtZero: true } } }
});

document.getElementById("footer").textContent = "Ruben AI · 最后更新: " + lastUpdate;
</script>
</body>
</html>
